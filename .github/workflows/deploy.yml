# GitHub Actions → Tailscale → SSH. Ver .github/CICD-SETUP.md
# DEPLOY_HOST: solo la IPv4 Tailscale del servidor (100.x), p. ej. 100.77.237.64 — no nombres (debian).
name: Deploy (Tailscale + SSH)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-prevencion
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest
          # Sin ping: evita "lookup: no such host" en tailscale ping (peers aún no propagados / MagicDNS).

      - name: Resolve DEPLOY_HOST for SSH
        id: deploy_host
        run: |
          set -e
          RAW='${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}'
          RAW=$(printf '%s' "$RAW" | tr -d '\r' | tr -d '[:space:]' | xargs)
          case "$RAW" in *=*) RAW="${RAW#*=}"; RAW=$(printf '%s' "$RAW" | tr -d '[:space:]' | xargs) ;; esac
          if [ -z "$RAW" ]; then
            echo "::error::DEPLOY_HOST vacío. Pon solo la IP Tailscale, p. ej. 100.77.237.64"
            exit 1
          fi
          if ! echo "$RAW" | grep -qE '^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$'; then
            echo "::error::DEPLOY_HOST debe ser la IPv4 (columna 1 de 'tailscale status' en el Debian). No uses nombres. Ejemplo: 100.77.237.64"
            exit 1
          fi
          echo "ip=$RAW" >> "$GITHUB_OUTPUT"
          echo "SSH: $RAW"

      - name: Add SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 || { echo "::error::La clave privada no carga (formato PEM/OpenSSH, sin contraseña, copia completa BEGIN…END)"; exit 1; }
          DH='${{ steps.deploy_host.outputs.ip }}'
          { ssh-keygen -F "$DH" -f ~/.ssh/known_hosts >/dev/null 2>&1; } || \
            ssh-keyscan -T 30 "$DH" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Remote deploy
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          set -e
          sleep 15
          P="${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}"
          if [ -z "$P" ] || [ "$P" = "SET_ME" ]; then
            echo "Define DEPLOY_PATH: Repository secret o variable (Settings → Actions → Secrets/Variables)"
            exit 1
          fi
          U="${DEPLOY_USER:-administrador}"
          REPO="git@github.com:${{ github.repository }}.git"
          BR="${{ github.ref_name }}"
          DH='${{ steps.deploy_host.outputs.ip }}'
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$U@$DH" \
            env \
              "INFISICAL_TOKEN=${INFISICAL_TOKEN:-}" \
              "APP_PRODUCT_OVERRIDE=prevencion" \
            bash -s "$P" "$REPO" "$BR" < .github/scripts/remote-deploy.sh
